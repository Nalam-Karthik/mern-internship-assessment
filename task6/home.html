<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home — SecureAuth</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="panel home-panel">
    <div id="avatar" class="avatar-ring"></div>
    <h1>Welcome, <span class="welcome-name" id="welcomeName"></span></h1>
    <p class="subtitle">You're logged in.</p>
    <button class="logout" id="logoutBtn">Logout</button>
  </div>

<script>
  // Bonus: restrict direct access to this page
  const loggedInUser = localStorage.getItem('loggedInUser');

  if(!loggedInUser){
    window.location.href = 'login.html';
  } else {
    document.getElementById('welcomeName').textContent = loggedInUser;
    document.getElementById('avatar').textContent = loggedInUser.charAt(0).toUpperCase();
  }

  document.getElementById('logoutBtn').addEventListener('click', function(){
    localStorage.removeItem('loggedInUser');
    alert('Logged out successfully');
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
