<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — SecureAuth</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="panel">
    <div class="brand">
      <div class="brand-mark">SA</div>
      <span>SecureAuth</span>
    </div>

    <h1>Create your account</h1>
    <p class="subtitle">It only takes a minute.</p>

    <form id="registerForm" novalidate>
      <label for="username">Username</label>
      <input type="text" id="username" autocomplete="username">
      <div class="field-error" id="err-username"></div>

      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email">
      <div class="field-error" id="err-email"></div>

      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="new-password">
      <div class="field-error" id="err-password"></div>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" autocomplete="tel">
      <div class="field-error" id="err-phone"></div>

      <button type="submit" class="primary">Register</button>
    </form>

    <div class="switch-link">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>

<script>
  const form = document.getElementById('registerForm');

  form.addEventListener('submit', function(e){
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const phone = document.getElementById('phone').value.trim();

    ['username','email','password','phone'].forEach(id => {
      document.getElementById('err-' + id).textContent = '';
    });

    let hasEmpty = false;
    if(!username){ document.getElementById('err-username').textContent = 'Required'; hasEmpty = true; }
    if(!email){ document.getElementById('err-email').textContent = 'Required'; hasEmpty = true; }
    if(!password){ document.getElementById('err-password').textContent = 'Required'; hasEmpty = true; }
    if(!phone){ document.getElementById('err-phone').textContent = 'Required'; hasEmpty = true; }

    if(hasEmpty){
      alert('All fields are required');
      return;
    }

    const registeredUser = { username, email, password, phone };
    localStorage.setItem('registeredUser', JSON.stringify(registeredUser));

    alert('Registration Successful');
    window.location.href = 'login.html';
  });
</script>
</body>
</html>
